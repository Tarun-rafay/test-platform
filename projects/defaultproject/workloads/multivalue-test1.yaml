apiVersion: apps.k8smgmt.io/v3
kind: Workload
metadata:
  name: multivalue-test1
  project: defaultproject
spec:
  artifact:
    artifact:
      chartPath:
        name: rctl/busybox-chart-0.1.0.tgz
      repository: krishna-repo
      revision: main
      valuesRef:
        repository: krishna-test-repo
        revision: main
        valuesPaths:
        - name: valueFiles/values-pre-prod.yaml
        - name: valueFiles/values-prod_fail.yaml
        - name: valueFiles/values-dev.yaml
    type: Helm
  namespace: apr7-ns
  placement:
    labels:
    - key: rafay.dev/clusterName
      value: krishna-pipeline-test
  version: v1
