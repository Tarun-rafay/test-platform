apiVersion: apps.k8smgmt.io/v3
kind: Workload
metadata:
  name: kkkss
  project: defaultproject
spec:
  artifact:
    artifact:
      chartPath:
        name: valueFiles/busybox-chart-0.1.0.tgz
      repository: krishna-test-repo
      revision: main
      valuesPaths:
      - name: valueFiles/values-dev.yaml
      - name: valueFiles/values-pre-prod.yaml
      - name: valueFiles/values-prod.yaml
    options:
      maxHistory: 10
      timeout: 5m0s
    type: Helm
  namespace: apr7-ns
