environment: dev

replicaCount: 28

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "1.25"

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80
