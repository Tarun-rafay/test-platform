environment: prod

replicaCount: 5

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "1.25"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 5
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
